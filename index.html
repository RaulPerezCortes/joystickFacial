<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Road Drift</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#1e1e2e;
  --accent:#e8e0d0;
  --accent2:#f0a030;
  --red:#e84040;
  --green:#38c060;
  --dim:#8888a8;
  --panel:#262638;
  --border:#3a3a50;
  --joy-bg:#1a1a28;
  --joy-base:#2e2e44;
  --joy-ring:#3e3e58;
  --joy-knob:#f0a030;
  --txt:#c8c0b0;
  --score-bg:#1a1a28;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Space Mono',monospace;height:100vh;overflow:hidden;display:flex;}

/* LEFT: game fills all remaining space */
#left{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
#game-wrap{flex:1;position:relative;overflow:hidden;}
#test-canvas{display:block;width:100%;height:100%;}

/* Score bar */
#score-row{flex-shrink:0;display:flex;background:var(--score-bg);border-top:2px solid var(--border);}
.score-box{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 4px;border-right:1px solid var(--border);}
.score-box:last-child{border-right:none;}
.score-val{font-size:1.4rem;font-weight:700;color:var(--accent2);line-height:1;}
.score-lbl{font-size:0.52rem;letter-spacing:0.12em;color:var(--dim);text-transform:uppercase;margin-top:2px;}

/* Overlay */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(20,20,34,0.94);}
#overlay.hidden{display:none;}
.ov-title{font-size:1.7rem;font-weight:700;color:var(--accent);text-align:center;line-height:1.2;white-space:pre-line;}
.ov-sub{font-size:0.6rem;color:var(--dim);letter-spacing:0.08em;text-align:center;line-height:2;}
.ov-score{font-size:1.1rem;font-weight:700;color:var(--accent2);}
.btn{font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:11px 30px;border:2px solid var(--accent2);background:transparent;color:var(--accent2);cursor:pointer;border-radius:3px;transition:all .18s;}
.btn:hover{background:var(--accent2);color:#1a1a2e;}

/* RIGHT panel */
#right{width:300px;flex-shrink:0;background:var(--panel);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}

/* Camera */
#cam-section{flex:1;position:relative;overflow:hidden;background:#0a0a12;min-height:0;}
#face-video{display:none;}
#face-canvas{width:100%;height:100%;display:block;}
.cam-lbl{position:absolute;bottom:6px;left:8px;font-size:0.55rem;letter-spacing:0.1em;color:#00f5c4;opacity:.9;}
#cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(4,4,14,0.95);text-align:center;padding:14px;}
#cam-overlay.hidden{display:none;}
.cam-hint{font-size:0.58rem;color:var(--dim);line-height:1.7;}

/* Joystick block */
#joy-block{flex-shrink:0;height:220px;display:flex;align-items:center;justify-content:center;gap:18px;padding:12px 16px;border-top:2px solid var(--border);background:var(--joy-bg);}

.joystick-base{width:140px;height:140px;border-radius:50%;background:var(--joy-base);border:2.5px solid var(--joy-ring);box-shadow:inset 0 4px 12px rgba(0,0,0,0.5),0 2px 6px rgba(0,0,0,0.3);position:relative;cursor:grab;flex-shrink:0;}
.joystick-base:active{cursor:grabbing;}
.joy-ring{position:absolute;border-radius:50%;border:1.5px solid var(--joy-ring);}
.joy-ring.r1{width:48px;height:48px;top:50%;left:50%;transform:translate(-50%,-50%);}
.joy-ring.r2{width:96px;height:96px;top:50%;left:50%;transform:translate(-50%,-50%);}
#joy-knob{width:42px;height:42px;border-radius:50%;background:var(--joy-knob);box-shadow:0 3px 12px rgba(240,160,48,0.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;}
#calib-dot{display:none !important;}

/* Controls beside joystick */
#joy-controls{display:flex;flex-direction:column;gap:8px;min-width:0;}
.joy-xy{font-size:0.58rem;color:var(--dim);}
.joy-xy span{color:var(--accent);font-weight:700;}
.sm-btn{font-family:'Space Mono',monospace;font-size:0.57rem;letter-spacing:0.09em;text-transform:uppercase;padding:6px 9px;border:1.5px solid var(--border);background:transparent;color:var(--txt);cursor:pointer;border-radius:2px;transition:all .18s;white-space:nowrap;}
.sm-btn:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(240,160,48,0.08);}
.sm-btn.danger{color:var(--red);border-color:#5a2828;}
#calib-badge{font-size:0.56rem;color:var(--green);display:none;}
.status-row{display:flex;flex-direction:column;gap:5px;}
.st{display:flex;align-items:center;gap:5px;font-size:0.57rem;color:var(--dim);}
.led{width:6px;height:6px;border-radius:50%;background:#444;flex-shrink:0;}
.led.on{background:var(--green);box-shadow:0 0 6px var(--green);}

/* Calib panel */
#calib-panel{display:none;position:fixed;bottom:20px;left:20px;z-index:300;width:240px;background:var(--panel);border:2px solid var(--border);border-radius:4px;padding:16px;box-shadow:0 6px 24px rgba(0,0,0,0.4);}
#cdots{display:none;}
#cheader{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
#carrow{font-size:1.5rem;flex-shrink:0;}
#ctitle{font-weight:700;font-size:0.75rem;color:var(--accent);}
#cdesc{font-size:0.6rem;color:var(--dim);line-height:1.75;margin-bottom:10px;}
#cbar-bg{background:#0e0e18;height:3px;border-radius:2px;margin-bottom:10px;overflow:hidden;}
#cbar{height:100%;width:0%;background:var(--accent2);border-radius:2px;}
#caction{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;padding:7px;border:1.5px solid var(--accent2);background:transparent;color:var(--accent2);cursor:pointer;border-radius:2px;width:100%;}
#caction:disabled{opacity:.3;cursor:not-allowed;}
#ccancel{font-family:'Space Mono',monospace;font-size:0.56rem;color:var(--dim);background:none;border:none;cursor:pointer;margin-top:6px;display:block;width:100%;text-align:center;}

/* ── MOBILE ── */
@media (max-width: 640px) {
  body { flex-direction: column; }

  /* LEFT column fills all */
  #left { flex: 1; width: 100%; display: flex; flex-direction: column; min-height: 0; }

  /* Score row at TOP */
  #score-row {
    order: -1;
    border-top: none;
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .score-val { font-size: 1.05rem; }
  .score-lbl { font-size: 0.44rem; }

  /* Game canvas fills remaining space above bottom bar */
  #game-wrap { flex: 1; min-height: 0; }

  /* Right panel becomes a bottom bar: full width, fixed height */
  #right {
    position: static;
    width: 100%;
    height: 160px;
    flex-shrink: 0;
    flex-direction: row;
    border-left: none;
    border-top: 2px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }

  /* Camera — left half of bottom bar */
  #cam-section {
    flex: 1;
    height: 100%;
    border-radius: 0;
    border: none;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .cam-lbl { font-size: 0.44rem; }

  /* Joystick — right half of bottom bar */
  #joy-block {
    flex: 1;
    height: 100%;
    border-radius: 0;
    border: none;
    border-top: none;
    background: var(--joy-bg);
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
  }
  /* Joystick — right half of bottom bar */
  #joy-block {
    flex: 1;
    height: 100%;
    border-radius: 0;
    border: none;
    border-top: none;
    background: var(--joy-bg);
    padding: 8px 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .joystick-base { width: 90px; height: 90px; }
  .joy-ring.r1 { width: 32px; height: 32px; }
  .joy-ring.r2 { width: 64px; height: 64px; }
  #joy-knob { width: 28px; height: 28px; }
  #joy-controls {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 0;
  }
  .joy-xy { display: none; }
  .status-row { flex-direction: row; flex-wrap: wrap; gap: 4px; }
  .st-face, .st-fps, .st-cam { display: none; }
  .sm-btn { font-size: 0.5rem; padding: 5px 7px; white-space: normal; line-height: 1.3; }
  #calib-badge { font-size: 0.48rem; }
}
</style>
</head>
<body>

<!-- LEFT: game fills all space -->
<div id="left">
  <div id="game-wrap">
    <canvas id="test-canvas"></canvas>
    <div id="overlay">
      <div class="ov-title" id="ov-title">ROAD
DRIFT</div>
      <div class="ov-score" id="ov-score" style="display:none"></div>
      <div class="ov-sub">Mantén el círculo dentro de la carretera<br>← → Girar &nbsp;·&nbsp; Joystick o cara</div>
      <button class="btn" id="play-btn">▶ INICIAR</button>
    </div>
  </div>
  <div id="score-row">
    <div class="score-box"><div class="score-val" id="val-dist">0</div><div class="score-lbl">metros</div></div>
    <div class="score-box"><div class="score-val" id="val-time">0.0</div><div class="score-lbl">segundos</div></div>
    <div class="score-box"><div class="score-val" id="val-best" style="color:var(--green)">—</div><div class="score-lbl">récord</div></div>
  </div>
</div>

<!-- RIGHT panel -->
<div id="right">
  <!-- Camera fills all space above joystick -->
  <div id="cam-section">
    <video id="face-video" autoplay playsinline muted></video>
    <canvas id="face-canvas"></canvas>
    <div class="cam-lbl">CÁMARA · JOYSTICK</div>
    <div id="cam-overlay">
      <div style="font-size:1.3rem">📷</div>
      <div class="cam-hint">Activa para controlar<br>con tu cara</div>
      <button class="sm-btn" id="btn-cam-start">Activar cámara</button>
    </div>
  </div>

  <!-- Joystick fixed at bottom -->
  <div id="joy-block">
    <div class="joystick-base" id="joy-base">
      <div class="joy-ring r2"></div>
      <div class="joy-ring r1"></div>
      <div id="calib-dot"></div>
      <div id="joy-knob"></div>
    </div>
    <div id="joy-controls">
      <div class="joy-xy">X:<span id="jx">0.00</span></div>
      <div class="joy-xy">Y:<span id="jy">0.00</span></div>
      <div class="status-row">
        <div class="st st-cam"><div class="led" id="led-cam"></div><span id="val-cam">OFF</span></div>
        <div class="st st-face"><div class="led" id="led-face"></div>Cara</div>
        <div class="st st-fps"><div class="led" id="led-fps"></div><span id="val-fps">—</span>fps</div>
      </div>
      <button class="sm-btn" id="btn-cam-toggle">Activar cámara</button>
      <button class="sm-btn" id="btn-calibrate">Calibrar cara</button>
      <div id="calib-badge"></div>
    </div>
  </div>
</div>

<!-- Calib panel -->
<div id="calib-panel">
  <div id="cdots"></div>
  <div id="cheader"><div id="carrow">🎯</div><div id="ctitle">Calibración</div></div>
  <p id="cdesc"></p>
  <div id="cbar-bg"><div id="cbar"></div></div>
  <button id="caction">Iniciar</button>
  <button id="ccancel">cancelar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
/* ══════════════════════════════
   JOYSTICK + FACE
══════════════════════════════ */
const faceVideo=document.getElementById('face-video');
const faceCanvas=document.getElementById('face-canvas');
const faceCtx=faceCanvas.getContext('2d');
const ledCam=document.getElementById('led-cam'),ledFace=document.getElementById('led-face'),ledFps=document.getElementById('led-fps');
const valCam=document.getElementById('val-cam'),valFps=document.getElementById('val-fps');
const joyKnob=document.getElementById('joy-knob');
const calibDot=document.getElementById('calib-dot');
const jxEl=document.getElementById('jx'),jyEl=document.getElementById('jy');

const NOSE=4, JR=46, SM=0.12, DZ=0.06;
let kx=0,ky=0;          // current knob px
let joyX=0,joyY=0;      // -1..1 exposed to game

let calibrated=false,calib={};
let cState='idle',cIdx=0,cSamples=[],cRaw={};

const OVAL=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
const CSTEPS=[
  {l:'Centro',   a:'⊙',c:'#1a1a2e',t:'Posición natural.',r:'center'},
  {l:'Arriba',   a:'↑',c:'#2dc653',t:'Cabeza <b>arriba</b> al máximo.',r:'up'},
  {l:'Abajo',    a:'↓',c:'#2dc653',t:'Cabeza <b>abajo</b> al máximo.',r:'down'},
  {l:'Izquierda',a:'←',c:'#2dc653',t:'Cabeza <b>izquierda</b> al máximo.',r:'left'},
  {l:'Derecha',  a:'→',c:'#2dc653',t:'Cabeza <b>derecha</b> al máximo.',r:'right'},
];
const STARGET={center:{x:0,y:0},up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};

function getOval(lm,w,h){let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;for(const i of OVAL){const p=lm[i];if(!p)continue;const px=p.x*w,py=p.y*h;x0=Math.min(x0,px);x1=Math.max(x1,px);y0=Math.min(y0,py);y1=Math.max(y1,py);}return{cx:(x0+x1)/2,cy:(y0+y1)/2,rx:(x1-x0)/2,ry:(y1-y0)/2};}

function faceToJoy(lm,w,h){
  const oval=getOval(lm,w,h);if(!oval.rx)return;
  const n=lm[NOSE];if(!n)return;
  let nx,ny;
  if(calibrated){
    const dx=n.x-calib.cx,dy=n.y-calib.cy;
    const vU={x:calib.ux-calib.cx,y:calib.uy-calib.cy},vD={x:calib.dx-calib.cx,y:calib.dy-calib.cy};
    const vL={x:calib.lx-calib.cx,y:calib.ly-calib.cy},vR={x:calib.rx-calib.cx,y:calib.ry-calib.cy};
    const dot=(v,a)=>(v.x*a.x+v.y*a.y)/(a.x**2+a.y**2+1e-9);
    const rawY=(p=>p>0?Math.min(1,p):Math.max(-1,-dot({x:dx,y:dy},vU)))(dot({x:dx,y:dy},vD));
    const rawX=(p=>p>0?Math.min(1,p):Math.max(-1,-dot({x:dx,y:dy},vL)))(dot({x:dx,y:dy},vR));
    const d=v=>{const s=v<0?-1:1,a=Math.abs(v);return a<DZ?0:s*Math.min(1,(a-DZ)/(1-DZ));};
    nx=d(rawX);ny=d(rawY);
  }else{
    nx=Math.max(-1,Math.min(1,(n.x*w-oval.cx)/oval.rx));
    ny=Math.max(-1,Math.min(1,(n.y*h-oval.cy)/oval.ry));
  }
  const tx=nx*JR,ty=ny*JR;
  kx+=(tx-kx)*SM;ky+=(ty-ky)*SM;
  setKnob(kx,ky);
}

function setKnob(x,y){
  joyKnob.style.transform=`translate(calc(-50% + ${x.toFixed(1)}px),calc(-50% + ${y.toFixed(1)}px))`;
  joyX=x/JR;joyY=y/JR;
  jxEl.textContent=joyX.toFixed(2);jyEl.textContent=joyY.toFixed(2);
}

/* Drag */
const joyBase=document.getElementById('joy-base');
let drag=false;
function applyDrag(cx2,cy2){const r=joyBase.getBoundingClientRect();let dx=cx2-(r.left+r.width/2),dy=cy2-(r.top+r.height/2);const d=Math.sqrt(dx*dx+dy*dy);if(d>JR){dx*=JR/d;dy*=JR/d;}kx=dx;ky=dy;setKnob(dx,dy);}
joyBase.addEventListener('mousedown',e=>{drag=true;e.preventDefault();});
window.addEventListener('mouseup',()=>{if(drag){drag=false;kx=0;ky=0;setKnob(0,0);}});
window.addEventListener('mousemove',e=>{if(drag)applyDrag(e.clientX,e.clientY);});
joyBase.addEventListener('touchstart',e=>{drag=true;e.preventDefault();},{passive:false});
window.addEventListener('touchend',()=>{if(drag){drag=false;kx=0;ky=0;setKnob(0,0);}});
window.addEventListener('touchmove',e=>{if(drag)applyDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});

/* Calibration */
const cPanel=document.getElementById('calib-panel'),cBar=document.getElementById('cbar'),cDots=document.getElementById('cdots');
const cAction=document.getElementById('caction'),cCancel=document.getElementById('ccancel'),cBadge=document.getElementById('calib-badge');
const cArrow=document.getElementById('carrow'),cTitle=document.getElementById('ctitle'),cDesc=document.getElementById('cdesc');

function buildDots(ai){} // dots hidden — no-op
function showCDot(rec){} // target dot removed
function showStep(i){cIdx=i;cSamples=[];cBar.style.width='0%';cArrow.textContent=CSTEPS[i].a;cArrow.style.color=CSTEPS[i].c;cTitle.textContent=CSTEPS[i].l;cTitle.style.color=CSTEPS[i].c;cDesc.innerHTML=CSTEPS[i].t+'<br><br><span style="color:#555">Cuando estés en posición, pulsa Confirmar.</span>';cAction.textContent='✓ Confirmar';cAction.disabled=false;cState='waiting';buildDots(i);showCDot(CSTEPS[i].r);}
function showIntro(){cState='intro';cBar.style.width='0%';cArrow.textContent='🎯';cArrow.style.color='#1a1a2e';cTitle.textContent='Calibración';cTitle.style.color='#1a1a2e';cDesc.innerHTML='Registra tu rango de movimiento en <b>5 posiciones</b>.';cAction.textContent='Empezar';cAction.disabled=false;buildDots(-1);}
function cTick(n){if(cState!=='waiting')return;cSamples.push({x:n.x,y:n.y});if(cSamples.length>20)cSamples.shift();}
function capture(){if(!cSamples.length)return;const avg=cSamples.reduce((a,b)=>({x:a.x+b.x,y:a.y+b.y}),{x:0,y:0});avg.x/=cSamples.length;avg.y/=cSamples.length;cRaw[CSTEPS[cIdx].r]=avg;cBar.style.width='100%';cAction.disabled=true;cAction.textContent='✓ Guardado';setTimeout(()=>{const n=cIdx+1;if(n<CSTEPS.length)showStep(n);else finishCalib();},300);}
function finishCalib(){const c=cRaw;calib={cx:c.center.x,cy:c.center.y,ux:c.up.x,uy:c.up.y,dx:c.down.x,dy:c.down.y,lx:c.left.x,ly:c.left.y,rx:c.right.x,ry:c.right.y};calibrated=true;cState='done';cArrow.textContent='✓';cTitle.textContent='¡Completado!';cBar.style.width='100%';cDesc.textContent='Calibración guardada.';cAction.textContent='Cerrar';cAction.disabled=false;buildDots(CSTEPS.length);calibDot.style.display='none';cBadge.style.display='block';cBadge.textContent='✓ calibrado';}
document.getElementById('btn-calibrate').addEventListener('click',()=>{cPanel.style.display='block';showIntro();});
cAction.addEventListener('click',()=>{if(cState==='intro')showStep(0);else if(cState==='waiting')capture();else if(cState==='done'){cPanel.style.display='none';cState='idle';}});
cCancel.addEventListener('click',()=>{cPanel.style.display='none';cState='idle';calibDot.style.display='none';});

/* FPS */
let fpsN=0,fpsT=performance.now();
function updFPS(){fpsN++;const now=performance.now();if(now-fpsT>=1000){valFps.textContent=Math.round(fpsN*1000/(now-fpsT));ledFps.classList.toggle('on',true);fpsN=0;fpsT=now;}}

/* Face results */
function onFace(res){
  updFPS();
  const w=faceCanvas.width,h=faceCanvas.height;
  faceCtx.clearRect(0,0,w,h);
  faceCtx.save();faceCtx.translate(w,0);faceCtx.scale(-1,1);faceCtx.drawImage(res.image,0,0,w,h);faceCtx.restore();
  const has=res.multiFaceLandmarks?.length>0;
  ledFace.classList.toggle('on',has);if(!has)return;
  for(const lm of res.multiFaceLandmarks){
    const m=lm.map(p=>({x:1-p.x,y:p.y,z:p.z}));
    faceToJoy(lm,w,h);
    if(cState==='waiting'&&lm[NOSE])cTick(lm[NOSE]);
    drawConnectors(faceCtx,m,FACEMESH_FACE_OVAL,{color:'rgba(0,245,196,0.7)',lineWidth:1.5});
    // nose dot
    const n=m[NOSE];if(n){const nx=n.x*w,ny=n.y*h;faceCtx.beginPath();faceCtx.arc(nx,ny,5,0,Math.PI*2);faceCtx.fillStyle='#00f5c4';faceCtx.fill();}
  }
}

let mpCam=null;
async function startCam(){
  document.getElementById('cam-overlay').classList.add('hidden');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:280,height:190,facingMode:'user'}});
    faceVideo.srcObject=s;await new Promise(r=>{faceVideo.onloadedmetadata=r;});
    faceCanvas.width=faceVideo.videoWidth||280;faceCanvas.height=faceVideo.videoHeight||190;
    const fm=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    fm.onResults(onFace);
    mpCam=new Camera(faceVideo,{onFrame:async()=>{await fm.send({image:faceVideo});},width:280,height:190});
    mpCam.start();
    ledCam.classList.add('on');valCam.textContent='ON';
    const t=document.getElementById('btn-cam-toggle');
    if(t){t.textContent='Detener cámara';t.classList.add('danger');}
  }catch(e){document.getElementById('cam-overlay').classList.remove('hidden');document.querySelector('.cam-hint').textContent='Error: '+e.message;}
}
function stopCam(){
  mpCam?.stop?.();faceVideo.srcObject?.getTracks().forEach(t=>t.stop());faceVideo.srcObject=null;
  faceCtx.clearRect(0,0,faceCanvas.width,faceCanvas.height);
  ledCam.classList.remove('on');ledFace.classList.remove('on');valCam.textContent='OFF';
  document.getElementById('cam-overlay').classList.remove('hidden');
  const t=document.getElementById('btn-cam-toggle');
  if(t){t.textContent='Activar cámara';t.classList.remove('danger');}
}
let camActive=false;
function toggleCam(){camActive=!camActive;camActive?startCam():stopCam();}
document.getElementById('btn-cam-start').addEventListener('click',startCam);
const btnToggle=document.getElementById('btn-cam-toggle');
if(btnToggle)btnToggle.addEventListener('click',toggleCam);


/* ══════════════════════════════
   GAME
══════════════════════════════ */
const cv  = document.getElementById('test-canvas');
const ctx = cv.getContext('2d');
let CW = 0, CH = 0;

function resizeCanvas() {
  const wrap = document.getElementById('game-wrap');
  CW = cv.width  = wrap.clientWidth;
  CH = cv.height = wrap.clientHeight;
}
resizeCanvas();
new ResizeObserver(resizeCanvas).observe(document.getElementById('game-wrap'));

/* ── Road config ── */
const ROAD_HALF  = 60;
const BALL_R     = 11;
const SLICE_H    = 4;

// Difficulty ramps up with distance — easy until ~1500m, full difficulty at 8000m
function difficulty() {
  return Math.min(1, Math.max(0, (dist2 - 1500) / 19500));
}
function scrollSpeed()  { return 2.2 + difficulty() * 3.8; }
// Max curve angle capped so ball can always steer through it
function angleLimit()   { return 0.22 + difficulty() * 0.18; } // 0.22 → 0.40

/* ── Seeded PRNG (mulberry32) — same road every time ── */
function makeRng(seed) {
  let s = seed >>> 0;
  return () => {
    s += 0x6d2b79f5;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
let rng = makeRng(0xdeadbeef);

/* Road buffer:
   sliceBase = slices consumed so far.
   slices[i] = centerX of slice (sliceBase + i).
   screenY of slice k = (k - sliceBase)*SLICE_H - scrollPx%SLICE_H
*/
let slices    = [];
let sliceBase = 0;
let scrollPx  = 0;
let roadGen   = { x: 0, angle: 0, segLen: 0, segTarget: 0 };

function ensureSlices() {
  const BUFFER = 150;
  const need = sliceBase + Math.ceil(CH / SLICE_H) + BUFFER;
  while (sliceBase + slices.length < need) {
    const w = CW || 600;
    if (roadGen.x === 0) { roadGen.x = w / 2; }

    // Segment-based generation: commit to a curve direction for many slices
    // before changing — this makes curves feel intentional, not wobbly
    if (roadGen.segLen <= 0) {
      // Pick a new target angle: biased away from edges, uses seeded rng
      const edgeBias = -(roadGen.x - w / 2) / (w * 0.38);
      const maxA = angleLimit();
      roadGen.segTarget = (rng() - 0.5) * 2 * maxA * 0.85 + edgeBias * maxA;
      roadGen.segTarget = Math.max(-maxA, Math.min(maxA, roadGen.segTarget));
      roadGen.segLen = Math.floor(rng() * 120 + 80);
    }

    // Smoothly interpolate angle toward segment target
    roadGen.angle += (roadGen.segTarget - roadGen.angle) * 0.025;
    roadGen.segLen--;

    roadGen.x += roadGen.angle * 2.8;
    roadGen.x  = Math.max(ROAD_HALF + 24, Math.min(w - ROAD_HALF - 24, roadGen.x));
    slices.push(roadGen.x);
  }
  const canTrim = sliceBase < Math.floor(scrollPx / SLICE_H);
  if (canTrim) {
    const trimN = Math.min(slices.length - Math.ceil(CH / SLICE_H) - 60,
                           Math.floor(scrollPx / SLICE_H) - sliceBase);
    if (trimN > 0) { slices.splice(0, trimN); sliceBase += trimN; }
  }
}

/* Get road center at a screen Y coordinate */
function roadCX(screenY) {
  const absSlice = scrollPx / SLICE_H + screenY / SLICE_H;
  const localIdx = absSlice - sliceBase;
  const i = Math.max(0, Math.min(slices.length - 2, Math.floor(localIdx)));
  const f = localIdx - Math.floor(localIdx);
  return slices[i] * (1 - f) + (slices[i + 1] ?? slices[i]) * f;
}

/* ── Ball ── */
let ballX = 0, ballVX = 0;
const STEER = 0.28, FRIC = 0.84;

/* ── State ── */
let dist2 = 0, elapsed = 0, offFrames = 0;
let gameState = 'idle', gameStart = 0, lastT = 0;

function resetGame() {
  slices = []; sliceBase = 0; scrollPx = 0;
  rng = makeRng(Date.now() ^ Math.floor(Math.random() * 0xffffffff));
  roadGen = { x: CW / 2, angle: 0, segLen: 0, segTarget: 0 };
  ensureSlices();
  // Place ball exactly at road center at its screen position
  ballX = roadCX(CH - 80); ballVX = 0;
  dist2 = 0; elapsed = 0; offFrames = 0;
  document.getElementById('val-dist').textContent = '0';
  document.getElementById('val-time').textContent = '0.0';
}

function startGame() {
  resetGame();
  gameState = 'running';
  document.getElementById('overlay').classList.add('hidden');
  gameStart = lastT = performance.now();
  requestAnimationFrame(gameLoop);
}
/* ── Best record ── */
let bestDist = parseInt(localStorage.getItem('facedrive_best') || '0', 10);
function updateBestDisplay() {
  document.getElementById('val-best').textContent = bestDist > 0 ? bestDist + 'm' : '—';
}
updateBestDisplay();

function endGame() {
  gameState = 'dead';
  const d = Math.floor(dist2);
  if (d > bestDist) {
    bestDist = d;
    localStorage.setItem('facedrive_best', bestDist);
    updateBestDisplay();
  }
  const isRecord = d >= bestDist;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('ov-title').textContent  = 'FUERA\nDE LA VÍA';
  document.getElementById('ov-score').style.display = 'block';
  document.getElementById('ov-score').textContent   =
    `${d}m · ${elapsed.toFixed(1)}s${isRecord && d > 0 ? ' · ¡RÉCORD!' : ''}`;
  document.getElementById('play-btn').textContent   = '▶ REINTENTAR';
}

document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('ov-title').textContent   = 'ROAD\nDRIFT';
  document.getElementById('ov-score').style.display = 'none';
  startGame();
});

const keys2 = {};
window.addEventListener('keydown', e => keys2[e.key] = true);
window.addEventListener('keyup',   e => keys2[e.key] = false);

/* ── Draw ── */
function drawGame() {
  ctx.clearRect(0, 0, CW, CH);
  const ballY  = CH - 80;
  const subOff = scrollPx % SLICE_H;
  const nRows  = Math.ceil(CH / SLICE_H) + 2;

  /* Dark background */
  ctx.fillStyle = '#14141e';
  ctx.fillRect(0, 0, CW, CH);

  /* Road + markings */
  for (let row = 0; row < nRows; row++) {
    const screenY   = row * SLICE_H - subOff;
    const absSlice  = Math.floor(scrollPx / SLICE_H) + row;
    const localIdx  = absSlice - sliceBase;
    if (localIdx < 0 || localIdx >= slices.length) continue;
    const cx = slices[localIdx];

    const stripe = Math.floor(absSlice / 4) % 2 === 0;
    ctx.fillStyle = '#272737';
    ctx.fillRect(cx - ROAD_HALF, screenY, ROAD_HALF * 2, SLICE_H);

    ctx.fillStyle = 'rgba(200,190,170,0.9)';
    ctx.fillRect(cx - ROAD_HALF - 3, screenY, 3, SLICE_H);
    ctx.fillRect(cx + ROAD_HALF,     screenY, 3, SLICE_H);

    if (stripe) {
      ctx.fillStyle = 'rgba(240,160,48,0.4)';
      ctx.fillRect(cx - 2, screenY, 4, SLICE_H);
    }

    const rumble = Math.floor(absSlice / 6) % 2 === 0;
    ctx.fillStyle = rumble ? '#c83030' : '#e8e0d0';
    ctx.fillRect(cx - ROAD_HALF - 10, screenY, 7, SLICE_H);
    ctx.fillRect(cx + ROAD_HALF + 3,  screenY, 7, SLICE_H);
  }

  /* Ball */
  const cx0    = roadCX(ballY);
  const onRoad = Math.abs(ballX - cx0) < ROAD_HALF;
  if (!onRoad) {
    ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R + 7, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(232,64,64,0.2)'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = onRoad ? '#e8e0d0' : '#e84040'; ctx.fill();
  ctx.strokeStyle = onRoad ? '#f0a030' : '#ff8080';
  ctx.lineWidth = 2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(ballX - 3, ballY - 4, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fill();

  /* Speed bar — right edge, only during game */
  if (gameState === 'running') {
    const d = difficulty();
    const maxH = CH - 100;
    const barH = maxH * d;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(CW - 10, CH - 50 - maxH, 6, maxH);
    const spColor = d < 0.4 ? '#38c060' : d < 0.75 ? '#f0a030' : '#e84040';
    ctx.fillStyle = spColor;
    ctx.fillRect(CW - 10, CH - 50 - barH, 6, barH);
  }

  /* Progress bar top */
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(0, 0, CW, 4);
  ctx.fillStyle = '#f0a030';
  ctx.fillRect(0, 0, Math.min(CW, (dist2 / 3000) * CW), 4);
}

/* ── Game loop ── */
function gameLoop(ts) {
  if (gameState !== 'running') return;
  const dt = Math.min((ts - lastT) / 16.67, 2.5); lastT = ts;
  elapsed = (ts - gameStart) / 1000;

  // Input
  let steer = joyX;
  if (keys2['ArrowLeft']  || keys2['a']) steer = -1;
  if (keys2['ArrowRight'] || keys2['d']) steer =  1;

  // Ball physics
  ballVX += steer * STEER * dt;
  ballVX *= Math.pow(FRIC, dt);
  ballX  += ballVX * dt;
  ballX   = Math.max(BALL_R, Math.min(CW - BALL_R, ballX));

  // Scroll — speed increases with difficulty
  const spd = scrollSpeed();
  scrollPx += spd * dt;
  dist2    += spd * dt * 2.8;

  // Keep road generated ahead
  ensureSlices();

  // Off-road
  const ballY = CH - 80;
  const cx0   = roadCX(ballY);
  if (Math.abs(ballX - cx0) > ROAD_HALF) {
    offFrames += dt;
    if (offFrames > 45) { endGame(); return; }
  } else {
    offFrames = Math.max(0, offFrames - dt * 2);
  }
  if (offFrames > 15 && offFrames - dt <= 15) { /* one-strike — just end */ }

  document.getElementById('val-dist').textContent = Math.floor(dist2);
  document.getElementById('val-time').textContent = elapsed.toFixed(1);

  drawGame();
  requestAnimationFrame(gameLoop);
}

/* ── Idle loop ── */
function idleLoop() {
  if (gameState === 'running') return;
  if (CW > 0) {
    if (slices.length < 10) { rng = makeRng(Date.now()); roadGen = { x: 0, angle: 0, segLen: 0, segTarget: 0 }; ensureSlices(); ballX = CW/2; }
    scrollPx += 1.2;
    ensureSlices();
    drawGame();
  }
  requestAnimationFrame(idleLoop);
}
idleLoop();


</script>
